<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Dashboard Admin - yuzu.com</title>
  <!-- Chart.js untuk grafik -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">
    <header>
      <h1>📊 Dashboard Admin</h1>
      <p id="lastUpdate">Terakhir diperbarui: <span id="updateTime">-</span></p>
    </header>

    <!-- Grid Statistik -->
    <div class="stats-grid">
      <div class="card">
        <h3>📤 Total Upload</h3>
        <span id="totalUpload">0</span>
      </div>
      <div class="card">
        <h3>👤 User Aktif</h3>
        <span id="activeUsers">0</span>
      </div>
      <div class="card">
        <h3>📁 File Hari Ini</h3>
        <span id="todayUpload">0</span>
      </div>
      <div class="card">
        <h3>📊 Status Bot</h3>
        <span id="botStatus" style="color: #28a745;">🟢 Online</span>
      </div>
    </div>

    <!-- Grafik Aktivitas -->
    <div class="chart-container">
      <h3>📈 Aktivitas Upload (7 Hari Terakhir)</h3>
      <canvas id="activityChart" width="400" height="200"></canvas>
    </div>

    <!-- Status 5 Channel -->
    <div class="channel-status">
      <h3>📡 Status 5 Channel</h3>
      <ul id="channelList">
        <!-- Diisi oleh JavaScript -->
      </ul>
    </div>

    <!-- Tombol Refresh manual (opsional) -->
    <button id="refreshBtn" style="margin-top: 20px; background: #6c757d;">🔄 Refresh Data</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
