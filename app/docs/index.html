<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App - Modern Light</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="user-badge" id="userBadge">👤 Menghubungkan...</div>

        <div class="header-section">
            <h1>📥 Upload ke Bot</h1>
            <p>Kirim file Anda melalui bot Telegram (Maks. 1 GB)</p>
        </div>

        <div class="input-row">
            <div class="file-input-wrapper">
                <input type="file" id="filePicker">
            </div>
            <button id="btnSend" class="btn-send">✈️</button>
        </div>

        <div class="progress-wrapper" id="progressWrapper" style="display: none;">
            <div class="progress-info">
                <span id="progressStatus">Mengunggah di latar belakang...</span>
                <span id="progressPercent" style="color: #0284c7; font-weight: bold;">0%</span>
            </div>
            <div class="track">
                <div class="bar" id="progressBar"></div>
            </div>
        </div>

        <hr>

        <div class="history-section">
            <h2>📋 Riwayat Upload Saya</h2>
            <div class="history-list" id="historyList">
                <div class="history-empty" id="historyEmpty">Belum ada riwayat unggahan.</div>
            </div>
        </div>

        <button id="btnClose" class="btn-red">Tutup App</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
