name: Deploy Static Websites (Mini App & Monitor)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/docs/**'          # Hanya jalankan jika ada perubahan di Mini App
      - 'monitor/**'           # Hanya jalankan jika ada perubahan di Dashboard
      - '.github/workflows/deploy.yml'  # Atau jika workflow ini berubah

# Memberi izin ke GitHub Actions untuk menulis ke branch gh-pages
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil kode terbaru dari repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Siapkan folder staging untuk deployment
      - name: Prepare deployment structure
        run: |
          mkdir -p deploy/mini-app
          mkdir -p deploy/monitor
          cp -r app/docs/* deploy/mini-app/
          cp -r monitor/* deploy/monitor/

      # 3. Deploy ke branch gh-pages menggunakan peaceiris/actions-gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          keep_files: false   # Hapus file lama dan ganti dengan yang baru
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy otomatis dari GitHub Actions (${{ github.sha }})'