<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Upload ke Channel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>📤 Upload ke Channel</h1>
    <p class="subtitle">Pilih video dari galeri untuk dikirim ke @vvbbvvpp</p>

    <div class="upload-area">
      <input type="file" id="fileInput" accept="video/*" multiple />
      <label for="fileInput" class="upload-label">📁 Pilih Video</label>
    </div>

    <div id="fileList" class="file-list"></div>

    <button id="uploadBtn" class="upload-btn" disabled>🚀 Upload Semua</button>

    <div id="status" class="status">Pilih video terlebih dahulu</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
